<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biodata 8 Orang</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    background: linear-gradient(-45deg, #4facfe, #00f2fe, #43e97b, #38f9d7);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
    transition: 0.5s;
}

/* Background bergerak */
@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

h1 {
    text-align: center;
    color: white;
}

/* Tombol Dark Mode */
.dark-btn {
    display: block;
    margin: 10px auto 20px;
    padding: 8px 15px;
    border: none;
    border-radius: 10px;
    background: white;
    cursor: pointer;
    transition: 0.3s;
    font-weight: bold;
}

.dark-btn:hover {
    transform: scale(1.1);
}

/* Container */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

/* Card */
.card {
    background: white;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transition: 0.4s;
    animation: fadeIn 1s ease forwards, floatCard 4s ease-in-out infinite;
    transform: translateY(30px);
    opacity: 0;
}

.card:hover {
    transform: scale(1.05);
}

/* Animasi muncul */
@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Animasi melayang */
@keyframes floatCard {
    0% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0); }
}

/* Foto bulat */
.profile {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 10px;
    border: 3px solid #4facfe;
}

/* ================= DARK MODE FIX ================= */

.dark {
    background: #111 !important;
    animation: none !important;
}

.dark h1 {
    color: white;
}

.dark .card {
    background: #1f1f1f;
    color: white;
}

.dark .dark-btn {
    background: #333;
    color: white;
}

</style>
</head>

<body>

<h1>Daftar Biodata 8 Orang</h1>
<button onclick="toggleDarkMode()" class="dark-btn" id="darkButton">🌙 Dark Mode</button>

<div class="container" id="biodataContainer"></div>

<script>
const dataOrang = [
    {nama:"Anaya Difilia", kelas:"11 IPA 1", umur:"16 Tahun", tempat_lahir:"Jakarta", hobi:"Basket, Dance", cita_cita:"Jadi orang yang berguna", motto_hidup:"Mencoba segala hal"},
    {nama:"Aurellia Shafa", kelas:"11 IPA 1", umur:"16 Tahun", tempat_lahir:"Jakarta", hobi:"Mendengarkan musik", cita_cita:"Jadi orang sukses", motto_hidup:"Jadilah versi terbaik dari dirimu"},
    {nama:"Sastya Razita", kelas:"11 IPA 1", umur:"16 Tahun", tempat_lahir:"Bekasi", hobi:"Mendengarkan musik", cita_cita:"Jadi orang kaya", motto_hidup:"Lebih baik mencoba daripada tidak sama sekali"},
    {nama:"Tiara Farzana Yumi Aji", kelas:"11 IPA 1", umur:"16 Tahun", tempat_lahir:"Jakarta", hobi:"Menggambar, menonton film", cita_cita:"Jadi pengusaha", motto_hidup:"Sometimes you win, sometimes you learn"},
    {nama:"Shabrina Kamila Syakhbana", kelas:"11 IPA 1", umur:"16 Tahun", tempat_lahir:"Jakarta", hobi:"Melukis, main musik", cita_cita:"Arsitek", motto_hidup:"Jack of all trades"},
    {nama:"Vinza Almavira", kelas:"11 IPA 1", umur:"17 Tahun", tempat_lahir:"Tegal", hobi:"Baca novel", cita_cita:"Pengusaha sukses", motto_hidup:"Dreams need action"},
    {nama:"Contoh Nama 7", kelas:"11 IPA 1", umur:"16 Tahun", tempat_lahir:"Bandung", hobi:"Olahraga", cita_cita:"Dokter", motto_hidup:"Tetap semangat"},
    {nama:"Contoh Nama 8", kelas:"11 IPA 1", umur:"16 Tahun", tempat_lahir:"Surabaya", hobi:"Menulis", cita_cita:"Programmer", motto_hidup:"Belajar setiap hari"}
];

const container = document.getElementById("biodataContainer");

dataOrang.forEach((orang, index) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = (index * 0.2) + "s";

    card.innerHTML = `
        <img src="https://i.pravatar.cc/150?img=${index+1}" class="profile">
        <h3>${orang.nama}</h3>
        <p><b>Kelas:</b> ${orang.kelas}</p>
        <p><b>Umur:</b> ${orang.umur}</p>
        <p><b>Tempat Lahir:</b> ${orang.tempat_lahir}</p>
        <p><b>Hobi:</b> ${orang.hobi}</p>
        <p><b>Cita-cita:</b> ${orang.cita_cita}</p>
        <p><b>Motto:</b> ${orang.motto_hidup}</p>
    `;

    container.appendChild(card);
});

function toggleDarkMode(){
    document.body.classList.toggle("dark");
    const btn = document.getElementById("darkButton");

    if(document.body.classList.contains("dark")){
        btn.textContent = "☀️ Light Mode";
    } else {
        btn.textContent = "🌙 Dark Mode";
    }
}
</script>

</body>
</html>
