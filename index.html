<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eight_Undercover</title>

<style>
body{
    font-family:'Poppins',sans-serif;
    margin:0;
    padding:0;
    overflow-x:hidden;
    transition:0.5s;
}

/* ================= OPENING ================= */
.opening{
    position:fixed;
    width:100%;
    height:100vh;
    background:linear-gradient(-45deg,#667eea,#764ba2,#1e3c72,#2a5298);
    background-size:400% 400%;
    animation:bgMove 8s ease infinite;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    z-index:999;
    transition:1s;
}

/* ✅ ANIMASI TULISAN OPENING (DIGABUNG 1) */
.opening h1{
    font-size:38px;
    animation: openingMove 4s ease-in-out infinite;
}

@keyframes openingMove{
    0%{
        opacity:0;
        transform:translateY(40px);
        text-shadow:0 0 5px white;
    }
    25%{
        opacity:1;
        transform:translateY(0);
        text-shadow:0 0 15px #00f2fe;
    }
    50%{
        transform:translateY(-10px);
        text-shadow:0 0 25px #ffffff;
    }
    75%{
        transform:translateY(0);
        text-shadow:0 0 15px #00f2fe;
    }
    100%{
        transform:translateY(40px);
        opacity:0;
        text-shadow:0 0 5px white;
    }
}

.opening button{
    padding:12px 25px;
    border:none;
    border-radius:20px;
    background:white;
    font-weight:bold;
    cursor:pointer;
    margin-top:20px;
    transition:0.3s;
}
.opening button:hover{
    transform:scale(1.1);
}

/* ================= BACKGROUND ANIMASI ================= */
@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.main-bg{
    min-height:100vh;
    padding:20px;
    background:linear-gradient(-45deg,#1e3c72,#2a5298,#0f2027,#243b55);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

/* Judul */
h1{
    text-align:center;
    color:white;
    text-shadow:0 0 10px white;
}

/* Dark Button */
.dark-btn{
    display:block;
    margin:10px auto 20px;
    padding:8px 15px;
    border:none;
    border-radius:10px;
    background:white;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}
.dark-btn:hover{
    transform:scale(1.05);
}

/* Container */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

/* Card */
.card{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    padding:20px;
    border-radius:25px;
    text-align:center;
    color:white;
    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0 0 20px rgba(255,255,255,0.2);
    animation:fadeIn 1s ease forwards, floatCard 4s ease-in-out infinite;
    transform:translateY(30px);
    opacity:0;
    transition:0.4s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 30px rgba(255,255,255,0.4);
}

@keyframes fadeIn{
    to{opacity:1; transform:translateY(0);}
}

@keyframes floatCard{
    0%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
    100%{transform:translateY(0);}
}

/* Animasi Nama */
.card h3{
    font-size:20px;
    font-weight:bold;
    background:linear-gradient(90deg,#ffffff,#00f2fe,#ffffff);
    background-size:200% auto;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:gradientText 3s linear infinite, slideName 4s ease-in-out infinite;
}

@keyframes gradientText{
    0%{background-position:0% center;}
    100%{background-position:200% center;}
}

@keyframes slideName{
    0%{transform:translateX(0);}
    50%{transform:translateX(8px);}
    100%{transform:translateX(0);}
}

/* Dark Mode */
.dark .main-bg{
    background:linear-gradient(-45deg,#3a3a3a,#4b4b4b,#5c5c5c,#444);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

.dark .card{
    background:rgba(255,255,255,0.08);
}

.dark .dark-btn{
    background:#555;
    color:white;
}
</style>
</head>

<body>

<div class="opening" id="opening">
<h1>✨ Eight Undercover ✨</h1>
<button onclick="startWebsite()">Masuk Website</button>
</div>

<div class="main-bg" id="mainContent" style="display:none;">
<h1>Eight Undecover</h1>
<button onclick="toggleDarkMode()" class="dark-btn" id="darkButton">🌙 Dark Mode</button>
<div class="container" id="biodataContainer"></div>
</div>

<script>
function startWebsite(){
document.getElementById("opening").style.opacity="0";
setTimeout(()=>{
document.getElementById("opening").style.display="none";
document.getElementById("mainContent").style.display="block";
},800);
}

const dataOrang=[
{nama:"Anaya Difilia", kelas:"11 IPA 1", umur:"16 Tahun", tempat_lahir:"Jakarta", hobi:"Basket", cita_cita:"Jadi orang berguna", motto_hidup:"Mencoba segala hal"},
{nama:"Aurellia Shafa", kelas:"11 IPA 1", umur:"16 Tahun", tempat_lahir:"Jakarta", hobi:"Mendengar musik", cita_cita:"Jadi orang sukses", motto_hidup:"Jadilah versi terbaik dari dirimu"},
{nama:"Sastya Razita", kelas:"11 IPA 1", umur:"16 Tahun", tempat_lahir:"Bekasi", hobi:"Mendengar musik", cita_cita:"Jadi orang kaya", motto_hidup:"Lebih baik mencoba dari pada tidak sama sekali"},
{nama:"Tiara Farzana", kelas:"11 IPA 1", umur:"16 Tahun", tempat_lahir:"Jakarta", hobi:"Menggambar", cita_cita:"Pengusaha", motto_hidup:"Sometimes you win, sometimes you learn"},
{nama:"Shabrina Kamila", kelas:"11 IPA 1", umur:"16 Tahun", tempat_lahir:"Jakarta", hobi:"Melukis", cita_cita:"Arsitek", motto_hidup:"Jack of all trades, master of none, but oftentimes better than a master of one"},
{nama:"Vinza Almavira", kelas:"11 IPA 1", umur:"17 Tahun", tempat_lahir:"Tegal", hobi:"Baca novel", cita_cita:"Pengusaha", motto_hidup:"Ingin jadi kaya raya supaya bisa bersedekah"},
{nama:"Labibah Rahma", kelas:"11 IPA 1", umur:"17 Tahun", tempat_lahir:"Jakarta", hobi:"Memasak", cita_cita:"Jadi orang sukses", motto_hidup:"Jangan takut gagal, takutlah jika tidak pernah mencoba"},
{nama:"Jasmine Putri", kelas:"11 IPA 1", umur:"16 Tahun", tempat_lahir:"Jakarta", hobi:"Mendengar musik", cita_cita:"Dokter", motto_hidup:"Jadi punk"}
];

const container=document.getElementById("biodataContainer");

dataOrang.forEach((orang,index)=>{
const card=document.createElement("div");
card.className="card";
card.style.animationDelay=(index*0.2)+"s";

card.innerHTML=`
<h3>${orang.nama}</h3>
<p><b>Kelas:</b> ${orang.kelas}</p>
<p><b>Umur:</b> ${orang.umur}</p>
<p><b>Tempat Lahir:</b> ${orang.tempat_lahir}</p>
<p><b>Hobi:</b> ${orang.hobi}</p>
<p><b>Cita-cita:</b> ${orang.cita_cita}</p>
<p><b>Motto:</b> ${orang.motto_hidup}</p>
`;
container.appendChild(card);
});

function toggleDarkMode(){
document.body.classList.toggle("dark");
const btn=document.getElementById("darkButton");
btn.textContent=document.body.classList.contains("dark")?"☀️ Light Mode":"🌙 Dark Mode";
}
</script>

</body>
</html>
